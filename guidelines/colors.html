<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--color-bg); }
  .row { display: flex; gap: var(--space-4); padding: var(--space-6); flex-wrap: wrap; }
  .sw { flex: 1; min-width: 120px; }
  .chip { height: 74px; border-radius: var(--radius-md); border: 1px solid rgba(28,20,16,0.08); }
  .name { font-weight: var(--fw-semibold); color: var(--color-ink); font-size: var(--fs-small); margin-top: var(--space-2); }
  .hex { color: var(--color-text-muted); font-size: 0.8rem; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#b30909"></div><div class="name">Roșu Pizza Deva · CTA</div><div class="hex">#b30909</div></div>
    <div class="sw"><div class="chip" style="background:#8a0707"></div><div class="name">Roșu închis · hover</div><div class="hex">#8a0707</div></div>
    <div class="sw"><div class="chip" style="background:#1c1410"></div><div class="name">Charcoal · ink</div><div class="hex">#1c1410</div></div>
    <div class="sw"><div class="chip" style="background:#faf4e9;border:1px solid #ece3d6"></div><div class="name">Cream · surface</div><div class="hex">#faf4e9</div></div>
    <div class="sw"><div class="chip" style="background:#e6b455"></div><div class="name">Auriu · accent</div><div class="hex">#e6b455</div></div>
  </div>
</body>
</html>
