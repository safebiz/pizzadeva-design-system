<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; }
  .panel { display: grid; place-items: center; padding: var(--space-12); }
  .light { background: var(--color-cream); }
  .dark { background: var(--color-ink); }
  img { height: 96px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="panel light"><img src="../logo/logo-color.png" alt="Pizza Deva" /></div>
    <div class="panel dark"><img src="../logo/logo-white.png" alt="Pizza Deva" /></div>
  </div>
</body>
</html>
